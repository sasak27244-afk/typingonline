<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Typing Battle - Button Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* ロビー画面 */
        #lobby { position: fixed; inset: 0; background: #111; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; padding-top: 50px; }
        .lobby-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #333; text-align: center; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        
        input { padding: 12px; font-size: 1.1rem; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; width: 280px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #00e676; }
        
        /* ボタン共通スタイル */
        .btn { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 10px; transition: 0.2s; display: inline-block; }
        .btn-pvp { background: #00e676; color: #000; }
        .btn-npc { background: #444; color: #fff; }
        
        /* ランキング表示ボタン専用 */
        .btn-rank-toggle { 
            background: #222; 
            color: #00e676; 
            border: 2px solid #00e676; 
            width: 80%; 
            margin-top: 20px;
            padding: 10px;
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn:active { transform: scale(0.95); }

        /* ランキング表示エリア */
        #ranking-area { display: none; width: 90%; max-width: 800px; margin-top: 20px; padding-bottom: 50px; }
        .ranking-board { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #444; margin: 0 10px; }
        .ranking-board h3 { color: #00e676; border-bottom: 1px solid #333; padding-bottom: 10px; text-align: center; margin-top: 0; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .rank-name { color: #ccc; }
        .rank-val { color: #ffd700; font-weight: bold; }

        /* ゲーム画面 */
        #game-view { display: none; text-align: center; width: 90%; max-width: 800px; }
        #timer { font-size: 4rem; color: #ff5252; font-weight: bold; }
        #target { font-size: 2.4rem; min-height: 3.5rem; line-height: 1.4; margin-top: 20px; }
        #trans { color: #00e676; font-size: 1.6rem; min-height: 2.5rem; margin-bottom: 20px; font-weight: bold; }
        .current { border-bottom: 4px solid #00e676; }
        .correct { color: #555; }
        .wrong { background: #ff5252; color: #fff; }
        
        #score-board { display: flex; justify-content: space-between; gap: 20px; margin-top: 20px; }
        .score-box { flex: 1; padding: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; }
        
        #result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 300; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="lobby-box">
        <h1 style="color: #00e676; margin: 0 0 10px 0;">TYPING BATTLE</h1>
        <div style="color: #ffd700; font-weight: bold; font-size: 1.2rem;">Your Rate: <span id="my-rate-val">0</span></div>
        <br>
        <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
        <br>
        <input type="text" id="room-input" placeholder="ROOM ID (Optional)">
        <div style="display: flex; justify-content: center;">
            <button class="btn btn-pvp" onclick="joinGame('pvp')">1v1 ONLINE</button>
            <button class="btn btn-npc" onclick="joinGame('npc')">NPC MODE</button>
        </div>
        
        <button id="toggle-rank-btn" class="btn btn-rank-toggle" onclick="toggleRanking()">🏆 VIEW RANKINGS</button>
    </div>

    <div id="ranking-area" style="display: none; flex-direction: row;">
        <div class="ranking-board">
            <h3>RATE TOP 10</h3>
            <div id="rate-list" style="text-align: left;">Fetching...</div>
        </div>
        <div class="ranking-board">
            <h3>NPC BEST 10</h3>
            <div id="npc-list" style="text-align: left;">Fetching...</div>
        </div>
    </div>
</div>

<div id="game-view">
    <div id="timer">60</div>
    <div id="status-msg" style="color:#ffd700; font-weight:bold;">READY?</div>
    <div id="target">Wait...</div>
    <div id="trans"></div>
    <div id="score-board">
        <div class="score-box">YOU: <span id="my-score">0</span></div>
        <div class="score-box"><span id="display-opp-name">ENEMY</span>: <span id="opp-score">0</span></div>
    </div>
    <div style="margin-top: 30px;">
        <button class="btn btn-npc" onclick="location.reload()">BACK TO LOBBY</button>
    </div>
</div>

<div id="result-overlay">
    <h1 id="win-lose-label" style="font-size: 5rem;"></h1>
    <div id="rate-change" style="font-size: 2rem; color: #ffd700;"></div>
    <div id="no-rate-reason" style="color: #888; margin-top: 10px;"></div>
    <button class="btn btn-pvp" onclick="location.reload()">BACK TO LOBBY</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAWRI-BVjVNIv3oeE28xpJCVOkKubDPYU",
        authDomain: "typing-game-5176f.firebaseapp.com",
        projectId: "typing-game-5176f",
        databaseURL: "https://typing-game-5176f-default-rtdb.firebaseio.com/",
        storageBucket: "typing-game-5176f.firebasestorage.app",
        messagingSenderId: "20880910771",
        appId: "1:20880910771:web:cf97c58cb713d5869943c6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "", mode = "pvp", roomId = "", myId = "u_" + Date.now();
    let questions = [], qIdx = 0, charIdx = 0, score = 0, oppScore = 0, myRate = 0, oppRate = 1000;
    let gameStarted = false, isReady = false, npcTimer;

    window.onload = () => {
        myRate = parseInt(localStorage.getItem('typing_rate')) || 0;
        document.getElementById('my-rate-val').innerText = myRate;
        document.getElementById('player-name').value = localStorage.getItem('typing_name') || "";
        document.getElementById('room-input').value = localStorage.getItem('typing_room') || "";
        loadData();
    };

    async function loadData() {
        const res = await fetch('questions.json?v=' + Date.now());
        questions = (await res.json()).sort(() => Math.random() - 0.5);
    }

    // ランキングの表示・非表示切り替え
    function toggleRanking() {
        const area = document.getElementById('ranking-area');
        const btn = document.getElementById('toggle-rank-btn');
        
        if (area.style.display === 'none') {
            area.style.display = 'flex';
            btn.innerText = "✖ HIDE RANKINGS";
            fetchRankingData();
        } else {
            area.style.display = 'none';
            btn.innerText = "🏆 VIEW RANKINGS";
        }
    }

    function fetchRankingData() {
        const rList = document.getElementById('rate-list');
        const nList = document.getElementById('npc-list');
        
        rList.innerText = "Loading...";
        nList.innerText = "Loading...";

        // レート
        db.ref('rate_ranking').orderByValue().limitToLast(10).once('value', snap => {
            rList.innerHTML = "";
            let arr = [];
            snap.forEach(c => { arr.push({name: c.key, val: c.val()}); });
            arr.reverse().forEach(r => {
                rList.innerHTML += `<div class="rank-item"><span>${r.name}</span><span class="rank-val">${r.val}</span></div>`;
            });
            if(!arr.length) rList.innerText = "No data.";
        });

        // NPCスコア
        db.ref('npc_ranking').orderByValue().limitToLast(10).once('value', snap => {
            nList.innerHTML = "";
            let arr = [];
            snap.forEach(c => { arr.push({name: c.key, val: c.val()}); });
            arr.reverse().forEach(r => {
                nList.innerHTML += `<div class="rank-item"><span>${r.name}</span><span class="rank-val">${r.val} pts</span></div>`;
            });
            if(!arr.length) nList.innerText = "No data.";
        });
    }

    function joinGame(selectedMode) {
        mode = selectedMode;
        myName = document.getElementById('player-name').value.trim() || "Guest";
        let rawRoomId = document.getElementById('room-input').value.trim();
        roomId = rawRoomId || "lobby_global";
        localStorage.setItem('typing_name', myName);
        localStorage.setItem('typing_room', rawRoomId);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        if (mode === 'pvp') setupPVP(); else setupNPC();
    }

    function setupPVP() {
        db.ref(`rooms/${roomId}/players/${myId}`).set({ name: myName, score: 0, ready: false, rate: myRate });
        db.ref(`rooms/${roomId}/players/${myId}`).onDisconnect().remove();
        db.ref(`rooms/${roomId}/players`).on('value', snap => {
            const players = snap.val() || {};
            const oppKey = Object.keys(players).find(id => id !== myId);
            if (oppKey) {
                const opp = players[oppKey];
                document.getElementById('display-opp-name').innerText = opp.name;
                document.getElementById('opp-score').innerText = opp.score;
                oppScore = opp.score; oppRate = opp.rate || 0;
                if (!gameStarted) document.getElementById('target').innerText = "Press Key to READY";
                if (players[myId].ready && opp.ready && !gameStarted) startGame();
            } else {
                document.getElementById('target').innerText = "WAITING...";
            }
        });
    }

    function setupNPC() {
        document.getElementById('display-opp-name').innerText = "NPC (HARD)";
        document.getElementById('target').innerText = "Press Key to START";
    }

    function startGame() {
        gameStarted = true;
        document.getElementById('status-msg').innerText = "GO!";
        render();
        let timeLeft = 60;
        const timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) { clearInterval(timerInterval); if(npcTimer) clearInterval(npcTimer); finishGame(); }
        }, 1000);
        if (mode === 'npc') {
            npcTimer = setInterval(() => { oppScore++; document.getElementById('opp-score').innerText = oppScore; }, 900);
        }
    }

    function render() {
        const q = questions[qIdx];
        document.getElementById('target').innerHTML = q.english.split('').map((c, i) => 
            `<span class="${i === charIdx ? 'current' : (i < charIdx ? 'correct' : '')}">${c}</span>`).join('');
        document.getElementById('trans').innerText = q.japanese;
    }

    function finishGame() {
        gameStarted = false;
        const label = document.getElementById('win-lose-label');
        const rateLabel = document.getElementById('rate-change');
        const reason = document.getElementById('no-rate-reason');
        const isOfficial = (mode === 'pvp' && roomId === "lobby_global");
        
        let diff = score - oppScore;
        if (diff > 0) { label.innerText = "YOU WIN!"; label.style.color = "#00e676"; }
        else if (diff < 0) { label.innerText = "YOU LOSE..."; label.style.color = "#ff5252"; }
        else { label.innerText = "DRAW"; label.style.color = "#eee"; }

        if (isOfficial) {
            let change = diff > 0 ? 30 : (diff < 0 ? -20 : 0);
            myRate = Math.max(0, myRate + change);
            localStorage.setItem('typing_rate', myRate);
            rateLabel.innerText = `Rate: ${myRate} (${change >= 0 ? '+' : ''}${change})`;
            db.ref(`rate_ranking/${myName}`).set(myRate);
        } else if (mode === 'npc') {
            rateLabel.innerText = `Score: ${score}`;
            reason.innerText = "NPCスコアを送信しました";
            db.ref(`npc_ranking/${myName}`).transaction(cur => (score > (cur || 0)) ? score : cur);
        } else {
            rateLabel.innerText = "No Change";
            reason.innerText = "プライベート戦は対象外です";
        }
        document.getElementById('result-overlay').style.display = 'flex';
    }

    window.addEventListener('keydown', e => {
        if (e.key.length !== 1) return;
        if (!gameStarted) {
            if (mode === 'pvp' && !isReady) { isReady = true; db.ref(`rooms/${roomId}/players/${myId}/ready`).set(true); }
            else if (mode === 'npc') startGame();
            return;
        }
        const q = questions[qIdx];
        if (e.key === q.english[charIdx]) {
            charIdx++; score++;
            if (charIdx >= q.english.length) { qIdx = (qIdx + 1) % questions.length; charIdx = 0; }
            render();
            document.getElementById('my-score').innerText = score;
            if (mode === 'pvp') db.ref(`rooms/${roomId}/players/${myId}/score`).set(score);
        }
    });
</script>
</body>
</html>
