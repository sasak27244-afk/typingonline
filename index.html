<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Typing Battle - Ranking Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #lobby { position: fixed; inset: 0; background: #111; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px 0; }
        .lobby-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { padding: 12px; font-size: 1.1rem; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; width: 280px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #00e676; }
        .btn { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 10px; transition: 0.2s; }
        .btn-pvp { background: #00e676; color: #000; }
        .btn-npc { background: #666; color: #fff; }
        .btn-rank { background: transparent; color: #00e676; border: 1px solid #00e676; font-size: 0.9rem; padding: 8px 20px; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        #rate-display { color: #ffd700; font-size: 1.5rem; margin-top: 5px; font-weight: bold; }

        /* ランキング用スタイル（初期は非表示） */
        #ranking-area { display: none; margin-top: 25px; width: 95%; max-width: 850px; flex-direction: row; gap: 20px; }
        .ranking-board { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #444; font-size: 0.9rem; text-align: left; }
        .ranking-board h3 { color: #00e676; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 5px; text-align: center; }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; }
        .rank-name { color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
        .rank-val { font-weight: bold; color: #ffd700; }

        #game-view { display: none; text-align: center; width: 90%; max-width: 800px; }
        #timer { font-size: 4rem; color: #ff5252; font-weight: bold; }
        #target { font-size: 2.4rem; min-height: 3.5rem; line-height: 1.4; margin-top: 20px; }
        #trans { color: #00e676; font-size: 1.6rem; min-height: 2.5rem; margin-bottom: 20px; font-weight: bold; }
        .current { border-bottom: 4px solid #00e676; }
        .correct { color: #555; }
        .wrong { background: #ff5252; color: #fff; }
        #score-board { display: flex; justify-content: space-between; gap: 20px; margin-top: 20px; }
        .score-box { flex: 1; padding: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; }
        #match-cancel-area { margin-top: 20px; display: none; }
        
        #result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 300; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="lobby-box">
        <h1 style="color: #00e676; margin: 0 0 10px 0;">TYPING BATTLE</h1>
        <div id="rate-display">Rate: <span id="my-rate-val">0</span></div>
        <br>
        <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
        <br>
        <input type="text" id="room-input" placeholder="ROOM ID (Optional)">
        <div>
            <button class="btn btn-pvp" onclick="joinGame('pvp')">1v1 ONLINE</button>
            <button class="btn btn-npc" onclick="joinGame('npc')">NPC MODE</button>
        </div>
        <button class="btn btn-rank" id="toggle-rank-btn" onclick="toggleRanking()">SHOW RANKING</button>
    </div>

    <div id="ranking-area">
        <div class="ranking-board">
            <h3>🏆 RATE TOP 10</h3>
            <div id="rate-list"></div>
        </div>
        <div class="ranking-board">
            <h3>🔥 NPC BEST 10</h3>
            <div id="npc-list"></div>
        </div>
    </div>
</div>

<div id="game-view">
    <div id="timer">60</div>
    <div id="status-msg" style="color:#ffd700; font-weight:bold;">READY?</div>
    <div id="target">Wait...</div>
    <div id="trans"></div>
    <div id="score-board">
        <div class="score-box"><span id="display-my-name">YOU</span>: <span id="my-score">0</span></div>
        <div class="score-box"><span id="display-opp-name">ENEMY</span>: <span id="opp-score">0</span></div>
    </div>
    <div id="match-cancel-area">
        <button class="btn btn-npc" onclick="leaveGame()">BACK TO LOBBY</button>
    </div>
</div>

<div id="result-overlay">
    <h1 id="win-lose-label" style="font-size: 5rem;"></h1>
    <div id="rate-change" style="font-size: 2rem;"></div>
    <div id="no-rate-reason" style="color: #888; margin-top: 10px;"></div>
    <button class="btn btn-pvp" onclick="location.reload()">BACK TO LOBBY</button>
</div>

<script>
    // Firebaseの設定（あなたの設定を維持）
    const firebaseConfig = {
        apiKey: "AIzaSyBAWRI-BVjVNIv3oeE28xpJCVOkKubDPYU",
        authDomain: "typing-game-5176f.firebaseapp.com",
        projectId: "typing-game-5176f",
        databaseURL: "https://typing-game-5176f-default-rtdb.firebaseio.com/",
        storageBucket: "typing-game-5176f.firebasestorage.app",
        messagingSenderId: "20880910771",
        appId: "1:20880910771:web:cf97c58cb713d5869943c6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "", mode = "pvp", roomId = "", myId = "u_" + Date.now();
    let questions = [], qIdx = 0, charIdx = 0, score = 0, oppScore = 0, myRate = 0, oppRate = 1000;
    let gameStarted = false, isReady = false, npcTimer;

    window.onload = () => {
        myRate = parseInt(localStorage.getItem('typing_rate')) || 0;
        document.getElementById('my-rate-val').innerText = myRate;
        document.getElementById('player-name').value = localStorage.getItem('typing_name') || "";
        document.getElementById('room-input').value = localStorage.getItem('typing_room') || "";
        loadData();
    };

    async function loadData() {
        const res = await fetch('questions.json?v=' + Date.now());
        questions = (await res.json()).sort(() => Math.random() - 0.5);
    }

    // ランキングの表示・非表示を切り替え
    function toggleRanking() {
        const area = document.getElementById('ranking-area');
        const btn = document.getElementById('toggle-rank-btn');
        
        if (area.style.display === 'flex') {
            area.style.display = 'none';
            btn.innerText = "SHOW RANKING";
        } else {
            area.style.display = 'flex';
            btn.innerText = "HIDE RANKING";
            fetchRanking(); // 表示する瞬間に最新データを取得
        }
    }

    function fetchRanking() {
        // レートランキング
        db.ref('rate_ranking').orderByValue().limitToLast(10).once('value', snap => {
            const list = document.getElementById('rate-list');
            list.innerHTML = "";
            let ranks = [];
            snap.forEach(c => { ranks.push({n: c.key, v: c.val()}); });
            ranks.reverse().forEach(r => {
                list.innerHTML += `<div class="rank-item"><span class="rank-name">${r.n}</span><span class="rank-val">${r.v}</span></div>`;
            });
            if (!ranks.length) list.innerHTML = "No data yet.";
        });

        // NPCスコアランキング
        db.ref('npc_ranking').orderByValue().limitToLast(10).once('value', snap => {
            const list = document.getElementById('npc-list');
            list.innerHTML = "";
            let ranks = [];
            snap.forEach(c => { ranks.push({n: c.key, v: c.val()}); });
            ranks.reverse().forEach(r => {
                list.innerHTML += `<div class="rank-item"><span class="rank-name">${r.n}</span><span class="rank-val">${r.v} pts</span></div>`;
            });
            if (!ranks.length) list.innerHTML = "No data yet.";
        });
    }

    // --- 以下、joinGame, startGame, render, finishGame 等のロジックは前回と同様 ---
    function joinGame(selectedMode) {
        mode = selectedMode;
        myName = document.getElementById('player-name').value.trim() || "Guest";
        let rawRoomId = document.getElementById('room-input').value.trim();
        roomId = rawRoomId || "lobby_global";
        localStorage.setItem('typing_name', myName);
        localStorage.setItem('typing_room', rawRoomId);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('display-my-name').innerText = myName;
        if (mode === 'pvp') setupPVP(); else setupNPC();
    }

    function setupPVP() {
        document.getElementById('match-cancel-area').style.display = 'block';
        db.ref(`rooms/${roomId}/players/${myId}`).set({ name: myName, score: 0, ready: false, rate: myRate });
        db.ref(`rooms/${roomId}/players/${myId}`).onDisconnect().remove();
        db.ref(`rooms/${roomId}/players`).on('value', snap => {
            const players = snap.val() || {};
            const oppKey = Object.keys(players).find(id => id !== myId);
            if (oppKey) {
                const opp = players[oppKey];
                document.getElementById('display-opp-name').innerText = opp.name;
                document.getElementById('opp-score').innerText = opp.score;
                oppScore = opp.score; oppRate = opp.rate || 0;
                if (!gameStarted) {
                    document.getElementById('target').innerText = "Press Key to READY";
                    document.getElementById('trans').innerText = "準備ができたらキーを押してください";
                }
                if (players[myId].ready && opp.ready && !gameStarted) startGame();
            } else {
                document.getElementById('target').innerText = "WAITING...";
                document.getElementById('trans').innerText = "対戦相手を待っています...";
            }
        });
    }

    function setupNPC() {
        document.getElementById('display-opp-name').innerText = "NPC (HARD)";
        document.getElementById('target').innerText = "Press Key to START";
        document.getElementById('trans').innerText = "キーを押すと開始します";
        document.getElementById('match-cancel-area').style.display = 'block';
    }

    function leaveGame() {
        if (mode === 'pvp') {
            db.ref(`rooms/${roomId}/players/${myId}`).remove();
            db.ref(`rooms/${roomId}/players`).off();
        }
        location.reload();
    }

    function startGame() {
        if (gameStarted) return;
        gameStarted = true;
        document.getElementById('match-cancel-area').style.display = 'none';
        document.getElementById('status-msg').innerText = "GO!";
        render();
        let timeLeft = 60;
        const timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (npcTimer) clearInterval(npcTimer);
                finishGame();
            }
        }, 1000);
        if (mode === 'npc') {
            npcTimer = setInterval(() => {
                oppScore++;
                document.getElementById('opp-score').innerText = oppScore;
            }, 900);
        }
    }

    function render() {
        if (!questions.length) return;
        const q = questions[qIdx];
        document.getElementById('target').innerHTML = q.english.split('').map((c, i) => 
            `<span class="${i === charIdx ? 'current' : (i < charIdx ? 'correct' : '')}">${c}</span>`).join('');
        document.getElementById('trans').innerText = q.japanese;
    }

    function finishGame() {
        gameStarted = false;
        const label = document.getElementById('win-lose-label');
        const rateLabel = document.getElementById('rate-change');
        const reasonLabel = document.getElementById('no-rate-reason');
        const isOfficialMatch = (mode === 'pvp' && roomId === "lobby_global");
        
        let baseChange = 0;
        if (score > oppScore) {
            label.innerText = "YOU WIN!"; label.style.color = "#00e676";
            baseChange = 30 + Math.floor((oppRate - myRate) / 100) * 2;
            if (baseChange < 10) baseChange = 10;
        } else if (score < oppScore) {
            label.innerText = "YOU LOSE..."; label.style.color = "#ff5252";
            baseChange = -30 + Math.floor((oppRate - myRate) / 100) * 2;
            if (baseChange > -5) baseChange = -5;
        } else { label.innerText = "DRAW"; }

        if (isOfficialMatch) {
            myRate = Math.max(0, myRate + baseChange);
            localStorage.setItem('typing_rate', myRate);
            rateLabel.innerText = `Rate: ${myRate} (${baseChange >= 0 ? '+' : ''}${baseChange})`;
            reasonLabel.innerText = "";
            db.ref(`rate_ranking/${myName}`).set(myRate);
        } else if (mode === 'npc') {
            rateLabel.innerText = "Score: " + score;
            reasonLabel.innerText = "NPCスコアを送信しました";
            db.ref(`npc_ranking/${myName}`).transaction(current => (score > (current || 0)) ? score : current);
        } else {
            rateLabel.innerText = "No Change";
            reasonLabel.innerText = "プライベート戦は対象外です";
        }
        document.getElementById('result-overlay').style.display = 'flex';
    }

    window.addEventListener('keydown', e => {
        if (e.key.length !== 1) return;
        if (!gameStarted) {
            if (mode === 'pvp' && !isReady) {
                isReady = true;
                db.ref(`rooms/${roomId}/players/${myId}/ready`).set(true);
            } else if (mode === 'npc') startGame();
            return;
        }
        const q = questions[qIdx];
        if (e.key === q.english[charIdx]) {
            charIdx++; score++;
            if (charIdx >= q.english.length) { qIdx = (qIdx + 1) % questions.length; charIdx = 0; }
            render();
            document.getElementById('my-score').innerText = score;
            if (mode === 'pvp') db.ref(`rooms/${roomId}/players/${myId}/score`).set(score);
        } else {
            const spans = document.querySelectorAll('#target span');
            if (spans[charIdx]) spans[charIdx].classList.add('wrong');
            setTimeout(() => render(), 100);
        }
    });
</script>
</body>
</html>
