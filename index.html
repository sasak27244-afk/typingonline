<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Typing Battle - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00e676; --error: #ff5252; --bg: #0d0d0d; --panel: #1a1a1a; }
        body { background: var(--bg); color: #eee; font-family: 'Consolas', monospace; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* ロビー UI */
        #lobby { position: fixed; inset: 0; background: #111; z-index: 200; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 20px; }
        .lobby-box { background: var(--panel); padding: 25px; border-radius: 15px; border: 2px solid #333; text-align: center; width: 90%; max-width: 420px; margin-bottom: 20px; }
        input[type="text"] { padding: 12px; font-size: 1rem; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; width: 85%; margin-bottom: 12px; outline: none; }
        .btn { padding: 12px 20px; font-size: 0.9rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 5px; transition: 0.2s; min-width: 120px; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-pvp { background: var(--primary); color: #000; }
        .btn-solo { background: #444; color: #fff; }
        .btn-back { background: transparent; color: #888; border: 1px solid #444; margin-top: 15px; }

        /* ランキング */
        #ranking-area { display: flex; width: 100%; max-width: 900px; gap: 15px; flex-wrap: wrap; justify-content: center; padding-bottom: 40px; }
        .ranking-board { flex: 1; min-width: 300px; background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #444; min-height: 400px; }
        .ranking-board h3 { color: var(--primary); text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 0; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }

        /* ゲーム画面 */
        #game-view { display: none; text-align: center; width: 95%; max-width: 800px; position: relative; transition: filter 0.3s; }
        #timer { font-size: 3.5rem; color: var(--error); font-weight: bold; margin: 10px 0; }
        #opp-display { display: none; color: var(--primary); font-size: 1.3rem; margin-bottom: 15px; border: 1px solid var(--primary); padding: 5px; border-radius: 5px; }

        /* ミス表示 */
        .miss-info { display: flex; justify-content: space-between; max-width: 500px; margin: 0 auto; color: var(--error); font-weight: bold; font-size: 0.9rem; }
        .miss-container { width: 100%; max-width: 500px; height: 12px; background: #333; margin: 5px auto 25px; border-radius: 6px; overflow: hidden; border: 1px solid #444; }
        #miss-bar { width: 0%; height: 100%; background: var(--error); transition: width 0.2s; }

        /* スタン演出 */
        #stun-overlay { 
            display: none; position: fixed; inset: 0; z-index: 1000; 
            background: rgba(0, 0, 0, 0.4); 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .stun-text { color: #ffffff; text-align: center; }
        .stun-text h2 { font-size: 5rem; margin: 0; font-weight: 900; letter-spacing: 5px; }
        .stun-text p { font-size: 2.5rem; font-weight: bold; }
        .is-stunned { filter: blur(20px); pointer-events: none; }

        /* テキスト表示 */
        #target { font-size: 2.5rem; min-height: 4rem; color: #fff; word-break: break-all; margin: 20px 0; }
        #trans { color: var(--primary); font-size: 1.5rem; min-height: 1.8rem; margin-bottom: 20px; }
        .current { border-bottom: 5px solid var(--primary); background: rgba(0, 230, 118, 0.1); }
        .correct { color: #555; }

        #result-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            flex-direction: column;
            align-items: center;      /* 子要素を中央に寄せる */
            justify-content: center;
            z-index: 300;
        }

/* ボタンが縦に伸びるのを防ぎ、サイズを固定する */
        #result-overlay .btn {
            width: 240px;            /* ボタンの横幅を固定 */
            height: 50px;            /* ボタンの高さを固定 */
            flex: none;              /* flexによる自動伸縮を無効化 */
            margin-top: 20px;        /* 上のテキストとの間隔 */
        }
    </style>
</head>
<body>

<div id="lobby">
    <div class="lobby-box">
        <h1 style="color: var(--primary); margin: 0; font-size: 2rem;">AI TYPING BATTLE</h1>
        <p style="color: #ffd700; font-weight: bold; margin: 10px 0;">Your Rate: <span id="my-rate-val">---</span></p>
        <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
        <input type="text" id="room-id-input" placeholder="ROOM ID (Optional)" maxlength="15">
        <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
            <button id="btn-pvp-start" class="btn btn-pvp" onclick="initPvP()">1v1 ONLINE</button>
            <button id="btn-solo-start" class="btn btn-solo" onclick="initSolo()">SOLO MODE</button>
        </div>
        <p id="match-status" style="margin-top:15px; font-size:0.8rem; color:#888; min-height: 1rem;"></p>
    </div>
    <div id="ranking-area">
        <div class="ranking-board"><h3>🏆 RATE RANKING</h3><div id="rate-list">Loading...</div></div>
        <div class="ranking-board"><h3>🔥 SOLO WPM RANKING</h3><div id="solo-list">Loading...</div></div>
    </div>
</div>

<div id="game-view">
    <div id="opp-display"><span id="opp-name">---</span>: <span id="opp-score">0</span> pts</div>
    <div id="timer">60</div>
    <div class="miss-info"><span>MISS WARNING</span><span id="miss-text">0 / 10</span></div>
    <div class="miss-container"><div id="miss-bar"></div></div>
    <div id="target">Ready...</div>
    <div id="trans"></div>
    <div style="font-size: 1.8rem; font-weight: bold;">SCORE: <span id="my-score">0</span></div>
    <button id="solo-back-btn" class="btn btn-back" onclick="location.reload()" style="display:none;">BACK TO LOBBY</button>
</div>

<div id="stun-overlay">
    <div class="stun-text">
        <h2>STUN!</h2>
        <p>WAIT <span id="stun-timer">2.0</span>s</p>
    </div>
</div>

<div id="result-overlay">
    <h1 id="res-title" style="font-size: 3.5rem; color: var(--primary); margin: 0;">FINISH!</h1>
    <div id="final-stats" style="color: #fff; font-size: 1.6rem; text-align: center; margin: 30px 0; line-height: 2;"></div>
    <button class="btn btn-pvp" onclick="location.reload()">BACK TO LOBBY</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAWRI-BVjVNIv3oeE28xpJCVOkKubDPYU",
        authDomain: "typing-game-5176f.firebaseapp.com",
        projectId: "typing-game-5176f",
        databaseURL: "https://typing-game-5176f-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "typing-game-5176f.firebasestorage.app",
        messagingSenderId: "20880910771",
        appId: "1:20880910771:web:cf97c58cb713d5869943c6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "", mode = "solo", myRate = 1000, roomId = null, pKey = "p1", questions = [];
    let qIdx = 0, charIdx = 0, score = 0, gameStarted = false, isStunned = false, missCount = 0, gameTimer = null;
    const TIME_LIMIT = 60;

    window.onload = () => {
        myRate = parseInt(localStorage.getItem('typing_rate')) || 1000;
        document.getElementById('my-rate-val').innerText = myRate;
        document.getElementById('player-name').value = localStorage.getItem('typing_name') || "";
        loadData();
        updateRanking();
        setInterval(updateRanking, 10000);
    };

    async function loadData() {
        try {
            const res = await fetch('questions.json?v=' + Date.now());
            questions = await res.json();
        } catch(e) { console.error("Data Load Error"); }
    }

    function updateRanking() {
        db.ref('rate_ranking').orderByValue().limitToLast(10).once('value', s => {
            let a = []; s.forEach(c => { a.push({n:c.key, v:c.val()}); });
            a.sort((x,y) => y.v - x.v);
            document.getElementById('rate-list').innerHTML = a.map((r,i) => `<div class="rank-item"><span>${i+1}. ${r.n}</span><span>${r.v} pt</span></div>`).join('');
        });
        db.ref('npc_ranking').orderByValue().limitToLast(10).once('value', s => {
            let a = []; s.forEach(c => { a.push({n:c.key, v:c.val()}); });
            a.sort((x,y) => y.v - x.v);
            document.getElementById('solo-list').innerHTML = a.map((r,i) => `<div class="rank-item"><span>${i+1}. ${r.n}</span><span>${r.v} WPM</span></div>`).join('');
        });
    }

    function setupUser() {
        myName = document.getElementById('player-name').value.trim() || "Guest";
        localStorage.setItem('typing_name', myName);
    }

    function initSolo() {
        mode = "solo";
        setupUser();
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('solo-back-btn').style.display = 'inline-block';
        document.getElementById('target').innerText = "Press Any Key to START";
    }

    function initPvP() {
        mode = "pvp";
        setupUser();
        const customId = document.getElementById('room-id-input').value.trim();
        
        // 待機中はソロボタンを無効化
        document.getElementById('btn-solo-start').disabled = true;
        document.getElementById('btn-pvp-start').innerText = "SEARCHING...";

        if (customId) {
            roomId = "custom_" + customId;
            const rRef = db.ref(`rooms/${roomId}`);
            rRef.once('value', s => {
                if (!s.exists() || !s.val().p1) {
                    pKey = "p1";
                    rRef.child('p1').set({ name: myName, score: 0, rate: myRate });
                    document.getElementById('match-status').innerText = "Waiting for Player 2...";
                    rRef.child('p2').on('value', s2 => { if(s2.exists()) startPvP(); });
                } else {
                    pKey = "p2";
                    rRef.child('p2').set({ name: myName, score: 0, rate: myRate });
                    startPvP();
                }
            });
        } else {
            document.getElementById('match-status').innerText = "Finding Opponent...";
            db.ref('waiting_room').transaction(cur => {
                if (cur) return null;
                return { id: "room_" + Date.now(), name: myName, rate: myRate };
            }, (err, committed, snap) => {
                if (snap.val() && snap.val().name === myName) {
                    roomId = snap.val().id; pKey = "p1";
                    db.ref(`rooms/${roomId}/p1`).set({ name: myName, score: 0, rate: myRate });
                    db.ref(`rooms/${roomId}/p2`).on('value', s => { if(s.exists()) startPvP(); });
                } else {
                    db.ref('waiting_room').once('value', s => {
                        if(!s.exists()) return;
                        roomId = s.val().id; pKey = "p2";
                        db.ref(`rooms/${roomId}/p2`).set({ name: myName, score: 0, rate: myRate });
                        db.ref('waiting_room').remove();
                        startPvP();
                    });
                }
            });
        }
    }

    function startPvP() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('opp-display').style.display = 'block';
        document.getElementById('solo-back-btn').style.display = 'none';
        const oppKey = pKey === "p1" ? "p2" : "p1";
        db.ref(`rooms/${roomId}/${oppKey}`).on('value', s => {
            if(s.exists()){
                document.getElementById('opp-name').innerText = s.val().name;
                document.getElementById('opp-score').innerText = s.val().score;
            }
        });
        let c = 3;
        const i = setInterval(() => {
            document.getElementById('target').innerText = c;
            if(c-- <= 0) { clearInterval(i); startGame(); }
        }, 1000);
    }

    function startGame() {
        gameStarted = true; score = 0; missCount = 0; charIdx = 0;
        questions.sort(()=>Math.random()-0.5);
        render(); updateMissUI();
        let t = TIME_LIMIT;
        gameTimer = setInterval(() => {
            document.getElementById('timer').innerText = --t;
            if(t <= 0) { clearInterval(gameTimer); finishGame(); }
        }, 1000);
    }

    function render() {
        const q = questions[qIdx];
        if(!q) return;
        document.getElementById('target').innerHTML = q.english.split('').map((c, i) => 
            `<span class="${i === charIdx ? 'current' : (i < charIdx ? 'correct' : '')}">${c}</span>`).join('');
        document.getElementById('trans').innerText = q.japanese;
    }

    function handleInput(key) {
        if (!gameStarted && mode === "solo") { startGame(); return; }
        if (!gameStarted || isStunned || key.length !== 1) return;

        const q = questions[qIdx];
        if (key === q.english[charIdx]) {
            charIdx++; score++;
            missCount = Math.max(0, missCount - 1);
            if (charIdx >= q.english.length) { charIdx = 0; qIdx = (qIdx + 1) % questions.length; }
            render();
            document.getElementById('my-score').innerText = score;
            if (mode === "pvp") db.ref(`rooms/${roomId}/${pKey}`).update({ score: score });
        } else {
            // ミスカウントを正確に+1
            missCount++;
            if (missCount >= 10) triggerStun();
        }
        updateMissUI();
    }

    function updateMissUI() {
        document.getElementById('miss-bar').style.width = (missCount * 10) + "%";
        document.getElementById('miss-text').innerText = missCount + " / 10";
    }

    function triggerStun() {
        isStunned = true;
        document.getElementById('game-view').classList.add('is-stunned');
        document.getElementById('stun-overlay').style.display = 'flex';
        let r = 2.0;
        const i = setInterval(() => {
            r -= 0.1;
            document.getElementById('stun-timer').innerText = r.toFixed(1);
            if (r <= 0) {
                clearInterval(i); isStunned = false; missCount = 0;
                document.getElementById('game-view').classList.remove('is-stunned');
                document.getElementById('stun-overlay').style.display = 'none';
                updateMissUI();
            }
        }, 100);
    }

    function finishGame() {
        gameStarted = false;
        // WPM算出: (合計打鍵数 / 5) / (経過時間(秒) / 60)
        const wpm = (score / 5) / (TIME_LIMIT / 60);
        const finalWPM = parseFloat(wpm.toFixed(1));

        if (mode === "pvp") {
            const oppKey = pKey === "p1" ? "p2" : "p1";
            db.ref(`rooms/${roomId}`).once('value', async s => {
                const d = s.val();
                if(!d || !d[oppKey]) return;
                const myS = d[pKey].score, oppS = d[oppKey].score;
                const oppRate = d[oppKey].rate || 1000;

                let base = 30;
                let adj = Math.floor((myRate - oppRate) / 100) * 2;
                let change = 0, resTxt = "";

                if (myS > oppS) {
                    change = base - adj;
                    resTxt = `VICTORY! (+${change})`; myRate += change;
                } else if (myS < oppS) {
                    change = base + adj;
                    resTxt = `DEFEAT... (-${change})`; myRate = Math.max(0, myRate - change);
                } else { resTxt = "DRAW"; }

                document.getElementById('res-title').innerText = resTxt;
                document.getElementById('final-stats').innerHTML = `My Score: ${myS}<br>Opponent: ${oppS}<br>WPM: ${finalWPM}<br>New Rate: ${myRate}`;
                
                db.ref(`rate_ranking/${myName}`).set(myRate);
                localStorage.setItem('typing_rate', myRate);
                db.ref(`rooms/${roomId}`).remove();
            });
        } else {
            document.getElementById('final-stats').innerHTML = `SCORE: ${score}<br>WPM: ${finalWPM}`;
            db.ref(`npc_ranking/${myName}`).transaction(c => finalWPM > (c||0) ? finalWPM : c);
        }
        document.getElementById('result-overlay').style.display = 'flex';
    }

    window.addEventListener('keydown', e => {
        // 入力欄にフォーカスがある時はゲーム入力を無視
        if (e.target.tagName === 'INPUT') return;
        // IME入力を無視
        if (e.key === 'Process' || e.key === '229') return; 
        handleInput(e.key);
    });
</script>
</body>
</html>
