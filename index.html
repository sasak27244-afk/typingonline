<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Typing Battle - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: 'Consolas', monospace; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #lobby { position: fixed; inset: 0; background: #111; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lobby-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #333; text-align: center; width: 90%; max-width: 400px; }
        
        input { padding: 12px; font-size: 1.1rem; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; width: 80%; margin-bottom: 15px; outline: none; }
        .btn { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 10px; transition: 0.2s; }
        .btn-pvp { background: #00e676; color: #000; }
        .btn-solo { background: #444; color: #fff; }

        /* ミスゲージのデザイン */
        .miss-container { width: 100%; max-width: 400px; height: 10px; background: #333; margin: 15px auto; border-radius: 5px; overflow: hidden; }
        #miss-bar { width: 0%; height: 100%; background: #ff5252; transition: width 0.2s, box-shadow 0.2s; }

        /* ゲーム画面 */
        #game-view { display: none; text-align: center; width: 95%; max-width: 800px; }
        #timer { font-size: 3.5rem; color: #ff5252; font-weight: bold; margin-bottom: 5px; }
        
        /* スタン状態の演出 */
        .stunned-effect { filter: grayscale(1) blur(2px); opacity: 0.4; pointer-events: none; }

        #target { font-size: 2.5rem; min-height: 3.5rem; margin-top: 15px; }
        #trans { color: #00e676; font-size: 1.5rem; margin-bottom: 25px; }
        .current { border-bottom: 5px solid #00e676; }
        .correct { color: #444; }
        .wrong-char { color: #ff5252 !important; background: rgba(255, 82, 82, 0.2); }

        #result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 300; }
        #mobile-input { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<input type="text" id="mobile-input" autocomplete="off">

<div id="lobby">
    <div class="lobby-box">
        <h1 style="color: #00e676;">TYPING BATTLE</h1>
        <div style="color: #ffd700;">Rate: <span id="my-rate-val">0</span></div>
        <br>
        <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
        <div style="display: flex; justify-content: center;">
            <button class="btn btn-pvp" onclick="joinGame('pvp')">1v1 ONLINE</button>
            <button class="btn btn-solo" onclick="joinGame('solo')">SOLO MODE</button>
        </div>
    </div>
</div>

<div id="game-view">
    <div id="timer">60</div>
    <div style="font-size: 0.8rem; color: #ff5252; font-weight: bold;">MISS GAUGE</div>
    <div class="miss-container"><div id="miss-bar"></div></div>
    <div id="target">Wait...</div>
    <div id="trans"></div>
    <div style="font-size: 1.5rem; font-weight: bold;">SCORE: <span id="my-score">0</span></div>
</div>

<div id="result-overlay">
    <h1 style="font-size: 3rem; color: #00e676;">FINISH!</h1>
    <div id="final-stats" style="color: #ffd700; font-size: 1.5rem; text-align: center; margin-bottom: 20px;"></div>
    <button class="btn btn-pvp" onclick="location.reload()">BACK TO LOBBY</button>
</div>

<script>
    // Firebaseの設定（省略せずにあなたのものを使用してください）
    const firebaseConfig = {
        apiKey: "AIzaSyBAWRI-BVjVNIv3oeE28xpJCVOkKubDPYU",
        authDomain: "typing-game-5176f.firebaseapp.com",
        projectId: "typing-game-5176f",
        databaseURL: "https://typing-game-5176f-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "typing-game-5176f.firebasestorage.app",
        messagingSenderId: "20880910771",
        appId: "1:20880910771:web:cf97c58cb713d5869943c6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "", mode = "solo", myRate = 0;
    let questions = [], qIdx = 0, charIdx = 0, score = 0, gameStarted = false;
    let missCount = 0, isStunned = false;
    const MAX_MISS = 10;
    const GAME_TIME = 60;

    window.onload = () => {
        myRate = parseInt(localStorage.getItem('typing_rate')) || 0;
        document.getElementById('my-rate-val').innerText = myRate;
        const savedName = localStorage.getItem('typing_name');
        if(savedName) {
            document.getElementById('player-name').value = savedName;
            myName = savedName;
        }
        loadData();
    };

    async function loadData() {
        try {
            const res = await fetch('questions.json?v=' + Date.now());
            questions = (await res.json()).sort(() => Math.random() - 0.5);
        } catch(e) { console.error(e); }
    }

    function joinGame(m) {
        mode = m;
        myName = document.getElementById('player-name').value.trim() || "Guest";
        localStorage.setItem('typing_name', myName);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('target').innerText = "Press Any Key to START";
        document.getElementById('mobile-input').focus();
    }

    function startGame() {
        gameStarted = true;
        score = 0; missCount = 0;
        document.getElementById('my-score').innerText = "0";
        let timeLeft = GAME_TIME;
        render();
        const timerInterval = setInterval(() => {
            if (!gameStarted) { clearInterval(timerInterval); return; }
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) { clearInterval(timerInterval); finishGame(); }
        }, 1000);
    }

    function render() {
        const q = questions[qIdx];
        if(!q) return;
        document.getElementById('target').innerHTML = q.english.split('').map((c, i) => 
            `<span class="${i === charIdx ? 'current' : (i < charIdx ? 'correct' : '')}">${c}</span>`).join('');
        document.getElementById('trans').innerText = q.japanese;
    }

    // ミスゲージとスタンの処理
    function updateMissStatus(isCorrect) {
        const bar = document.getElementById('miss-bar');
        
        if (isCorrect) {
            missCount = Math.max(0, missCount - 1);
        } else {
            missCount++;
            // ターゲットを赤く光らせる演出
            const currentSpan = document.querySelectorAll('#target span')[charIdx];
            if(currentSpan) {
                currentSpan.classList.add('wrong-char');
                setTimeout(() => currentSpan.classList.remove('wrong-char'), 150);
            }
        }

        const percentage = (missCount / MAX_MISS) * 100;
        bar.style.width = percentage + "%";

        if (missCount >= MAX_MISS) {
            triggerPenalty();
        }
    }

    function triggerPenalty() {
        isStunned = true;
        document.getElementById('game-view').classList.add('stunned-effect');
        
        setTimeout(() => {
            isStunned = false;
            missCount = 0;
            document.getElementById('miss-bar').style.width = "0%";
            document.getElementById('game-view').classList.remove('stunned-effect');
        }, 2000);
    }

    function finishGame() {
        gameStarted = false;
        const wpm = (score / 5) / (GAME_TIME / 60);
        document.getElementById('final-stats').innerHTML = `Score: ${score} pts<br>WPM: ${wpm.toFixed(1)}`;
        
        if (mode === 'solo') {
            db.ref(`npc_ranking/${myName}`).transaction(cur => (score > (cur || 0)) ? score : cur);
        }
        document.getElementById('result-overlay').style.display = 'flex';
    }

    function handleInput(key) {
        if (!gameStarted) { startGame(); return; }
        if (isStunned || key.length !== 1) return;

        const q = questions[qIdx];
        if (key === q.english[charIdx]) {
            charIdx++; score++;
            updateMissStatus(true);
            if (charIdx >= q.english.length) { qIdx = (qIdx + 1) % questions.length; charIdx = 0; }
            render();
            document.getElementById('my-score').innerText = score;
        } else {
            updateMissStatus(false);
        }
    }

    window.addEventListener('keydown', e => handleInput(e.key));
    document.getElementById('mobile-input').addEventListener('input', e => {
        const val = e.target.value;
        if(val.length > 0) {
            handleInput(val.slice(-1));
            e.target.value = "";
        }
    });
</script>
</body>
</html>
