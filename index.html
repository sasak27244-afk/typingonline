<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Typing Battle - Engineering Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: 'Consolas', monospace; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* ロビー画面 */
        #lobby { position: fixed; inset: 0; background: #111; z-index: 200; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 40px 20px; }
        .lobby-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #333; text-align: center; width: 100%; max-width: 400px; margin-bottom: 30px; }
        
        input { padding: 12px; font-size: 1.1rem; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; width: 85%; margin-bottom: 15px; outline: none; }
        .btn { padding: 12px 25px; font-size: 1rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 5px; transition: 0.2s; }
        .btn-pvp { background: #00e676; color: #000; }
        .btn-solo { background: #444; color: #fff; }

        /* ランキング */
        #ranking-area { display: flex; width: 100%; max-width: 800px; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 50px; }
        .ranking-board { flex: 1; min-width: 280px; background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #444; }
        .ranking-board h3 { color: #00e676; text-align: center; margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }

        /* ゲーム画面 */
        #game-view { display: none; text-align: center; width: 95%; max-width: 800px; position: relative; }
        #timer { font-size: 3.5rem; color: #ff5252; font-weight: bold; }
        
        /* ミス表示 */
        .miss-info { display: flex; justify-content: space-between; max-width: 400px; margin: 0 auto; color: #ff5252; font-weight: bold; font-size: 0.9rem; }
        .miss-container { width: 100%; max-width: 400px; height: 12px; background: #333; margin: 5px auto 20px; border-radius: 6px; overflow: hidden; }
        #miss-bar { width: 0%; height: 100%; background: #ff5252; transition: width 0.1s; }

        /* ペナルティ演出（白背景に黒文字で視認性最大） */
        #stun-overlay { 
            display: none; position: absolute; inset: -20px; 
            background: #ffffff; color: #000000; z-index: 1000; 
            flex-direction: column; align-items: center; justify-content: center;
            border-radius: 20px; box-shadow: 0 0 50px #fff;
        }
        #stun-overlay h2 { font-size: 5rem; margin: 0; font-weight: 900; }

        /* テキスト表示 */
        #target { font-size: 2.8rem; min-height: 4rem; margin-top: 20px; color: #fff; }
        #trans { color: #00e676; font-size: 1.6rem; margin-bottom: 30px; }
        .current { border-bottom: 5px solid #00e676; }
        .correct { color: #555; }
        .wrong-char { color: #ff5252 !important; background: rgba(255, 82, 82, 0.3); }

        #result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 300; }
        #mobile-input { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<input type="text" id="mobile-input" autocomplete="off">

<div id="lobby">
    <div class="lobby-box">
        <h1 style="color: #00e676; margin: 0;">TYPING BATTLE</h1>
        <p style="color: #ffd700; font-weight: bold;">Your Rate: <span id="my-rate-val">---</span></p>
        <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
        <div style="display: flex; justify-content: center; gap: 10px;">
            <button class="btn btn-pvp" onclick="initPvP()">1v1 ONLINE</button>
            <button class="btn btn-solo" onclick="initSolo()">SOLO MODE</button>
        </div>
        <p id="match-status" style="margin-top:15px; font-size:0.9rem; color:#888;"></p>
    </div>

    <div id="ranking-area">
        <div class="ranking-board"><h3>RATE TOP 10</h3><div id="rate-list"></div></div>
        <div class="ranking-board"><h3>SOLO BEST 10</h3><div id="solo-list"></div></div>
    </div>
</div>

<div id="game-view">
    <div id="stun-overlay">
        <h2>STOP!</h2>
        <p style="font-size: 2rem; font-weight: bold;">WAIT: <span id="stun-timer">2.0</span>s</p>
    </div>
    <div id="opp-display" style="color: #00e676; margin-bottom: 10px; display: none;">
        Opponent: <span id="opp-name">---</span> | Score: <span id="opp-score">0</span>
    </div>
    <div id="timer">60</div>
    <div class="miss-info"><span>MISS WARNING</span><span id="miss-text">0 / 10</span></div>
    <div class="miss-container"><div id="miss-bar"></div></div>
    <div id="target">Wait...</div>
    <div id="trans"></div>
    <div style="font-size: 1.8rem; font-weight: bold;">SCORE: <span id="my-score">0</span></div>
</div>

<div id="result-overlay">
    <h1 id="res-title" style="font-size: 3.5rem; color: #00e676;">FINISH!</h1>
    <div id="final-stats" style="color: #fff; font-size: 1.5rem; text-align: center; margin: 20px 0;"></div>
    <button class="btn btn-pvp" onclick="location.reload()">BACK TO LOBBY</button>
</div>

<script>
    // Firebase設定（再確認済み）
    const firebaseConfig = {
        apiKey: "AIzaSyBAWRI-BVjVNIv3oeE28xpJCVOkKubDPYU",
        authDomain: "typing-game-5176f.firebaseapp.com",
        projectId: "typing-game-5176f",
        databaseURL: "https://typing-game-5176f-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "typing-game-5176f.firebasestorage.app",
        messagingSenderId: "20880910771",
        appId: "1:20880910771:web:cf97c58cb713d5869943c6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "", mode = "solo", myRate = 1000, roomId = null, pKey = "p1";
    let questions = [], qIdx = 0, charIdx = 0, score = 0, gameStarted = false, isStunned = false, missCount = 0;

    window.onload = () => {
        myRate = parseInt(localStorage.getItem('typing_rate')) || 1000;
        document.getElementById('my-rate-val').innerText = myRate;
        document.getElementById('player-name').value = localStorage.getItem('typing_name') || "";
        loadData();
        updateRanking();
        setInterval(updateRanking, 10000);
    };

    async function loadData() {
        const res = await fetch('questions.json?v=' + Date.now());
        questions = await res.json();
    }

    function updateRanking() {
        db.ref('rate_ranking').limitToLast(10).once('value', s => {
            let a = []; s.forEach(c => { a.push({n:c.key, v:c.val()}); });
            a.sort((x,y) => y.v - x.v);
            document.getElementById('rate-list').innerHTML = a.map((r,i) => `<div class="rank-item"><span>${i+1}. ${r.n}</span><span>${r.v}</span></div>`).join('');
        });
        db.ref('npc_ranking').limitToLast(10).once('value', s => {
            let a = []; s.forEach(c => { a.push({n:c.key, v:c.val()}); });
            a.sort((x,y) => y.v - x.v);
            document.getElementById('solo-list').innerHTML = a.map((r,i) => `<div class="rank-item"><span>${i+1}. ${r.n}</span><span>${r.v}</span></div>`).join('');
        });
    }

    function initSolo() {
        mode = "solo";
        myName = document.getElementById('player-name').value.trim() || "Guest";
        localStorage.setItem('typing_name', myName);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('target').innerText = "Press Any Key to START";
        document.getElementById('mobile-input').focus();
    }

    function initPvP() {
        mode = "pvp";
        myName = document.getElementById('player-name').value.trim() || "Guest";
        localStorage.setItem('typing_name', myName);
        document.getElementById('match-status').innerText = "Matching...";

        db.ref('waiting_room').transaction(cur => {
            if (cur) return null;
            return { id: Date.now(), name: myName };
        }, (err, committed, snap) => {
            if (snap.val() && snap.val().name === myName) {
                roomId = snap.val().id; pKey = "p1";
                db.ref(`rooms/${roomId}/p1`).set({ name: myName, score: 0 });
                db.ref(`rooms/${roomId}/p2`).on('value', s => {
                    if (s.exists()) startPvPFlow();
                });
            } else {
                db.ref('waiting_room').once('value', s => {
                    roomId = s.val().id; pKey = "p2";
                    db.ref(`rooms/${roomId}/p2`).set({ name: myName, score: 0 });
                    db.ref('waiting_room').remove();
                    startPvPFlow();
                });
            }
        });
    }

    function startPvPFlow() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('opp-display').style.display = 'block';
        
        const oppKey = (pKey === "p1") ? "p2" : "p1";
        db.ref(`rooms/${roomId}/${oppKey}`).on('value', s => {
            if (s.exists()) {
                document.getElementById('opp-name').innerText = s.val().name;
                document.getElementById('opp-score').innerText = s.val().score;
            }
        });

        let countdown = 3;
        const i = setInterval(() => {
            document.getElementById('target').innerText = "READY: " + countdown;
            if (countdown-- <= 0) { clearInterval(i); startGame(); }
        }, 1000);
    }

    function startGame() {
        gameStarted = true; score = 0; missCount = 0; charIdx = 0;
        questions.sort(() => Math.random() - 0.5);
        render(); updateMissUI();
        let timeLeft = 60;
        const i = setInterval(() => {
            document.getElementById('timer').innerText = --timeLeft;
            if (timeLeft <= 0) { clearInterval(i); finishGame(); }
        }, 1000);
        document.getElementById('mobile-input').focus();
    }

    function render() {
        const q = questions[qIdx];
        document.getElementById('target').innerHTML = q.english.split('').map((c, i) => 
            `<span class="${i === charIdx ? 'current' : (i < charIdx ? 'correct' : '')}">${c}</span>`).join('');
        document.getElementById('trans').innerText = q.japanese;
    }

    function updateMissUI() {
        document.getElementById('miss-bar').style.width = (missCount * 10) + "%";
        document.getElementById('miss-text').innerText = missCount + " / 10";
        if (missCount >= 10 && !isStunned) triggerStun();
    }

    function triggerStun() {
        isStunned = true;
        document.getElementById('stun-overlay').style.display = 'flex';
        let r = 2.0;
        const i = setInterval(() => {
            r -= 0.1;
            document.getElementById('stun-timer').innerText = r.toFixed(1);
            if (r <= 0) {
                clearInterval(i); isStunned = false; missCount = 0;
                document.getElementById('stun-overlay').style.display = 'none'; updateMissUI();
            }
        }, 100);
    }

    function handleInput(key) {
        if (!gameStarted && mode === "solo") { startGame(); return; }
        if (!gameStarted || isStunned || key.length !== 1) return;

        const q = questions[qIdx];
        if (key === q.english[charIdx]) {
            charIdx++; score++;
            missCount = Math.max(0, missCount - 1);
            if (charIdx >= q.english.length) { charIdx = 0; qIdx = (qIdx + 1) % questions.length; }
            render();
            document.getElementById('my-score').innerText = score;
            if (mode === "pvp") db.ref(`rooms/${roomId}/${pKey}`).update({ score: score });
        } else {
            missCount++;
            const s = document.querySelectorAll('#target span')[charIdx];
            if(s) { s.classList.add('wrong-char'); setTimeout(()=>s.classList.remove('wrong-char'),150); }
        }
        updateMissUI();
    }

    function finishGame() {
        gameStarted = false;
        if (mode === "pvp") {
            const oppKey = (pKey === "p1") ? "p2" : "p1";
            db.ref(`rooms/${roomId}`).once('value', async s => {
                const d = s.val();
                const oppName = d[oppKey].name;
                const myS = d[pKey].score;
                const oppS = d[oppKey].score;

                // 相手のレートを検索
                const oppSnap = await db.ref(`rate_ranking/${oppName}`).once('value');
                const oppRate = oppSnap.val() || 1000;

                // --- レート計算（基本±30、100差で±2） ---
                let base = 30;
                let adj = Math.floor((myRate - oppRate) / 100) * 2;
                let change = 0, resTxt = "";

                if (myS > oppS) {
                    change = base - adj;
                    resTxt = `WIN (+${change})`; myRate += change;
                } else if (myS < oppS) {
                    change = base + adj;
                    resTxt = `LOSE (-${change})`; myRate = Math.max(0, myRate - change);
                } else {
                    resTxt = "DRAW (±0)";
                }

                document.getElementById('res-title').innerText = resTxt;
                document.getElementById('final-stats').innerHTML = `Your: ${myS} vs Opp: ${oppS}<br>Rate: ${myRate}`;
                db.ref(`rate_ranking/${myName}`).set(myRate);
                localStorage.setItem('typing_rate', myRate);
            });
        } else {
            document.getElementById('final-stats').innerText = `SCORE: ${score}`;
            db.ref(`npc_ranking/${myName}`).transaction(c => score > (cur=c||0) ? score : cur);
        }
        document.getElementById('result-overlay').style.display = 'flex';
    }

    window.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' && e.target.id !== 'mobile-input') return;
        handleInput(e.key);
    });
    document.getElementById('mobile-input').addEventListener('input', e => {
        handleInput(e.target.value.slice(-1)); e.target.value = "";
    });
</script>
</body>
</html>
