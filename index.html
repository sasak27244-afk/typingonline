<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Typing Battle - Professional</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: 'Consolas', monospace; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* ロビー画面 */
        #lobby { position: fixed; inset: 0; background: #111; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .lobby-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #333; text-align: center; width: 90%; max-width: 400px; margin-bottom: 20px; }
        
        input { padding: 12px; font-size: 1.1rem; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; width: 85%; margin-bottom: 15px; outline: none; }
        .btn { padding: 12px 25px; font-size: 1rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 5px; transition: 0.2s; }
        .btn-pvp { background: #00e676; color: #000; }
        .btn-solo { background: #444; color: #fff; }
        .btn-rank-toggle { background: #222; color: #00e676; border: 2px solid #00e676; width: 100%; margin-top: 10px; }

        /* ランキングエリア */
        #ranking-area { display: none; width: 90%; max-width: 800px; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .ranking-board { flex: 1; min-width: 300px; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        .ranking-board h3 { color: #00e676; text-align: center; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; font-size: 0.9rem; color: #fff; }

        /* ゲーム画面 */
        #game-view { display: none; text-align: center; width: 95%; max-width: 800px; position: relative; }
        #timer { font-size: 3.5rem; color: #ff5252; font-weight: bold; }
        
        /* ミス表示エリア */
        .miss-info { display: flex; justify-content: space-between; align-items: center; max-width: 400px; margin: 0 auto; color: #ff5252; font-weight: bold; font-size: 0.9rem; }
        .miss-container { width: 100%; max-width: 400px; height: 12px; background: #333; margin: 5px auto 20px; border-radius: 6px; overflow: hidden; }
        #miss-bar { width: 0%; height: 100%; background: #ff5252; transition: width 0.1s; }

        /* スタン（ペナルティ）演出 */
        .stunned-effect { filter: grayscale(1) brightness(0.2) blur(8px); opacity: 0.5; pointer-events: none; }
        #stun-message { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: #ffffff; font-size: 4rem; font-weight: 900; z-index: 1000;
            text-shadow: 0 0 20px #ff0000; text-align: center;
        }

        #target { font-size: 2.8rem; min-height: 4rem; margin-top: 20px; color: #fff; }
        #trans { color: #00e676; font-size: 1.6rem; margin-bottom: 30px; }
        .current { border-bottom: 5px solid #00e676; }
        .correct { color: #555; }
        .wrong-char { color: #ff5252 !important; background: rgba(255, 82, 82, 0.3); }

        #result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 300; }
        #mobile-input { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<input type="text" id="mobile-input" autocomplete="off">

<div id="lobby">
    <div class="lobby-box">
        <h1 style="color: #00e676; margin: 0;">TYPING BATTLE</h1>
        <p style="color: #ffd700; font-weight: bold;">Your Rate: <span id="my-rate-val">0</span></p>
        <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
        <div style="display: flex; justify-content: center;">
            <button class="btn btn-pvp" onclick="joinGame('pvp')">1v1 ONLINE</button>
            <button class="btn btn-solo" onclick="joinGame('solo')">SOLO MODE</button>
        </div>
        <button class="btn btn-rank-toggle" onclick="toggleRanking()">🏆 VIEW RANKINGS</button>
    </div>

    <div id="ranking-area">
        <div class="ranking-board">
            <h3>RATE TOP 10</h3>
            <div id="rate-list">Loading...</div>
        </div>
        <div class="ranking-board">
            <h3>SOLO BEST 10</h3>
            <div id="solo-list">Loading...</div>
        </div>
    </div>
</div>

<div id="game-view">
    <div id="stun-message">STOP<br><span id="stun-timer">2.0</span>s</div>
    <div id="timer">60</div>
    
    <div class="miss-info">
        <span>MISS WARNING</span>
        <span id="miss-text">0 / 10</span>
    </div>
    <div class="miss-container"><div id="miss-bar"></div></div>

    <div id="target">Wait...</div>
    <div id="trans"></div>
    <div style="font-size: 1.8rem; font-weight: bold; color: #fff;">SCORE: <span id="my-score">0</span></div>
</div>

<div id="result-overlay">
    <h1 style="font-size: 4rem; color: #00e676; margin: 0;">FINISH!</h1>
    <div id="final-stats" style="color: #ffd700; font-size: 1.8rem; text-align: center; margin: 20px 0;"></div>
    <button class="btn btn-pvp" onclick="location.reload()">BACK TO LOBBY</button>
</div>

<script>
    // Firebase設定
    const firebaseConfig = {
        apiKey: "AIzaSyBAWRI-BVjVNIv3oeE28xpJCVOkKubDPYU",
        authDomain: "typing-game-5176f.firebaseapp.com",
        projectId: "typing-game-5176f",
        databaseURL: "https://typing-game-5176f-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "typing-game-5176f.firebasestorage.app",
        messagingSenderId: "20880910771",
        appId: "1:20880910771:web:cf97c58cb713d5869943c6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "", mode = "solo", myRate = 0;
    let questions = [], qIdx = 0, charIdx = 0, score = 0, gameStarted = false;
    let missCount = 0, isStunned = false;
    const MAX_MISS = 10;
    const GAME_TIME = 60;

    window.onload = () => {
        myRate = parseInt(localStorage.getItem('typing_rate')) || 0;
        document.getElementById('my-rate-val').innerText = myRate;
        const savedName = localStorage.getItem('typing_name');
        if(savedName) {
            document.getElementById('player-name').value = savedName;
            myName = savedName;
        }
        loadData();
        fetchRankingData();
    };

    async function loadData() {
        try {
            const res = await fetch('questions.json?v=' + Date.now());
            questions = (await res.json()).sort(() => Math.random() - 0.5);
        } catch(e) { console.error(e); }
    }

    function toggleRanking() {
        const area = document.getElementById('ranking-area');
        area.style.display = (area.style.display === 'flex') ? 'none' : 'flex';
        if(area.style.display === 'flex') fetchRankingData();
    }

    function fetchRankingData() {
        // RATEランキング
        db.ref('rate_ranking').once('value', snap => {
            let arr = []; snap.forEach(c => { arr.push({n: c.key, v: c.val()}); });
            arr.sort((a,b) => b.v - a.v);
            document.getElementById('rate-list').innerHTML = arr.slice(0,10).map(r => `<div class="rank-item"><span>${r.n}</span><span>${r.v}</span></div>`).join('') || "No Data";
        });
        // SOLOランキング
        db.ref('npc_ranking').once('value', snap => {
            let arr = []; snap.forEach(c => { arr.push({n: c.key, v: c.val()}); });
            arr.sort((a,b) => b.v - a.v);
            document.getElementById('solo-list').innerHTML = arr.slice(0,10).map(r => `<div class="rank-item"><span>${r.n}</span><span>${r.v} pts</span></div>`).join('') || "No Data";
        });
    }

    function joinGame(m) {
        mode = m;
        myName = document.getElementById('player-name').value.trim() || "Guest";
        localStorage.setItem('typing_name', myName);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('target').innerText = "Press Any Key to START";
        document.getElementById('mobile-input').focus();
    }

    function startGame() {
        gameStarted = true;
        score = 0; missCount = 0;
        document.getElementById('my-score').innerText = "0";
        updateMissUI();
        let timeLeft = GAME_TIME;
        render();
        const timerInterval = setInterval(() => {
            if (!gameStarted) { clearInterval(timerInterval); return; }
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) { clearInterval(timerInterval); finishGame(); }
        }, 1000);
    }

    function render() {
        const q = questions[qIdx];
        if(!q) return;
        document.getElementById('target').innerHTML = q.english.split('').map((c, i) => 
            `<span class="${i === charIdx ? 'current' : (i < charIdx ? 'correct' : '')}">${c}</span>`).join('');
        document.getElementById('trans').innerText = q.japanese;
    }

    function updateMissUI() {
        const bar = document.getElementById('miss-bar');
        const text = document.getElementById('miss-text');
        const percentage = (missCount / MAX_MISS) * 100;
        bar.style.width = Math.min(percentage, 100) + "%";
        text.innerText = `${missCount} / ${MAX_MISS}`;
        
        if (missCount >= MAX_MISS && !isStunned) {
            triggerPenalty();
        }
    }

    function triggerPenalty() {
        isStunned = true;
        const gameView = document.getElementById('game-view');
        const stunMsg = document.getElementById('stun-message');
        const stunTimerDisp = document.getElementById('stun-timer');
        
        gameView.classList.add('stunned-effect');
        stunMsg.style.display = 'block';

        let remaining = 2.0;
        const countdown = setInterval(() => {
            remaining -= 0.1;
            stunTimerDisp.innerText = remaining.toFixed(1);
            if (remaining <= 0) {
                clearInterval(countdown);
                isStunned = false;
                missCount = 0;
                updateMissUI();
                gameView.classList.remove('stunned-effect');
                stunMsg.style.display = 'none';
            }
        }, 100);
    }

    function finishGame() {
        gameStarted = false;
        const wpm = (score / 5) / (GAME_TIME / 60);
        document.getElementById('final-stats').innerHTML = `Score: ${score} pts<br>WPM: ${wpm.toFixed(1)}`;
        
        if (mode === 'solo') {
            db.ref(`npc_ranking/${myName}`).transaction(cur => (score > (cur || 0)) ? score : cur);
        }
        document.getElementById('result-overlay').style.display = 'flex';
    }

    function handleInput(key) {
        if (!gameStarted) { startGame(); return; }
        if (isStunned || key.length !== 1) return;

        const q = questions[qIdx];
        if (key === q.english[charIdx]) {
            charIdx++; score++;
            missCount = Math.max(0, missCount - 1);
            updateMissUI();
            if (charIdx >= q.english.length) { qIdx = (qIdx + 1) % questions.length; charIdx = 0; }
            render();
            document.getElementById('my-score').innerText = score;
        } else {
            missCount++;
            updateMissUI();
            const currentSpan = document.querySelectorAll('#target span')[charIdx];
            if(currentSpan) {
                currentSpan.classList.add('wrong-char');
                setTimeout(() => currentSpan.classList.remove('wrong-char'), 150);
            }
        }
    }

    window.addEventListener('keydown', e => handleInput(e.key));
    document.getElementById('mobile-input').addEventListener('input', e => {
        const val = e.target.value;
        if(val.length > 0) {
            handleInput(val.slice(-1));
            e.target.value = "";
        }
    });
</script>
</body>
</html>
