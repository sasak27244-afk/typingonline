<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Typing Battle - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00e676; --error: #ff5252; --bg: #0d0d0d; --panel: #1a1a1a; }
        body { background: var(--bg); color: #eee; font-family: 'Consolas', 'Courier New', monospace; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: manipulation; }
        
        /* ロビー & レスポンシブ設計 */
        #lobby { position: fixed; inset: 0; background: #111; z-index: 200; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 20px; }
        .lobby-box { background: var(--panel); padding: 25px; border-radius: 15px; border: 2px solid #333; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        input[type="text"] { padding: 12px; font-size: 1rem; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; width: 85%; margin-bottom: 15px; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .btn { padding: 12px 20px; font-size: 0.9rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 5px; transition: 0.2s; min-width: 120px; }
        .btn-pvp { background: var(--primary); color: #000; }
        .btn-solo { background: #444; color: #fff; }

        /* ランキング */
        #ranking-area { display: flex; width: 100%; max-width: 900px; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }
        .ranking-board { flex: 1; min-width: 300px; background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #444; font-size: 0.9rem; }
        .ranking-board h3 { color: var(--primary); text-align: center; margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 8px; }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; }

        /* ゲーム画面 */
        #game-view { display: none; text-align: center; width: 95%; max-width: 800px; position: relative; }
        #timer { font-size: 3rem; color: var(--error); font-weight: bold; margin-bottom: 10px; }
        
        /* 対戦相手情報 */
        #opp-display { display: none; background: rgba(0,230,118,0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: var(--primary); border: 1px solid var(--primary); }

        /* ミス表示 */
        .miss-info { display: flex; justify-content: space-between; width: 100%; max-width: 500px; margin: 0 auto; color: var(--error); font-weight: bold; font-size: 0.8rem; }
        .miss-container { width: 100%; max-width: 500px; height: 10px; background: #333; margin: 5px auto 25px; border-radius: 5px; overflow: hidden; }
        #miss-bar { width: 0%; height: 100%; background: var(--error); transition: width 0.2s; }

        /* スタン（ペナルティ）オーバーレイ - 視認性重視 */
        #stun-overlay { 
            display: none; position: fixed; inset: 0; 
            background: #ffffff; color: #000000; z-index: 2000; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        #stun-overlay h2 { font-size: 6rem; margin: 0; font-weight: 900; line-height: 1; }
        #stun-overlay p { font-size: 2.5rem; font-weight: bold; margin-top: 10px; }

        /* テキストエリア */
        #target { font-size: 2.2rem; min-height: 3.5rem; margin-top: 10px; color: #fff; word-break: break-all; line-height: 1.2; }
        #trans { color: var(--primary); font-size: 1.3rem; margin-bottom: 25px; min-height: 1.5rem; }
        .current { border-bottom: 4px solid var(--primary); background: rgba(0, 230, 118, 0.2); }
        .correct { color: #555; }
        .wrong-char { animation: shake 0.1s infinite; color: var(--error) !important; }

        @keyframes shake { 0% { transform: translateX(0); } 50% { transform: translateX(3px); } 100% { transform: translateX(0); } }

        #result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); flex-direction: column; align-items: center; justify-content: center; z-index: 300; padding: 20px; text-align: center; }
        #mobile-input { position: absolute; opacity: 0; pointer-events: none; }

        /* スマホ向け調整 */
        @media (max-width: 600px) {
            #target { font-size: 1.6rem; }
            #trans { font-size: 1rem; }
            .lobby-box { padding: 15px; }
            #stun-overlay h2 { font-size: 4rem; }
        }
    </style>
</head>
<body>

<input type="text" id="mobile-input" autocomplete="off" ontouchstart="this.focus()">

<div id="lobby">
    <div class="lobby-box">
        <h1 style="color: var(--primary); margin: 0 0 5px 0; font-size: 1.8rem;">AI TYPING BATTLE</h1>
        <p style="color: #ffd700; font-weight: bold; margin-bottom: 15px;">Rate: <span id="my-rate-val">---</span></p>
        <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
            <button class="btn btn-pvp" onclick="initPvP()">1v1 ONLINE</button>
            <button class="btn btn-solo" onclick="initSolo()">SOLO MODE</button>
        </div>
        <p id="match-status" style="margin-top:15px; font-size:0.8rem; color:#888;"></p>
    </div>

    <div id="ranking-area">
        <div class="ranking-board"><h3>🏆 RATE TOP 10</h3><div id="rate-list">Loading...</div></div>
        <div class="ranking-board"><h3>🔥 SOLO BEST (WPM)</h3><div id="solo-list">Loading...</div></div>
    </div>
</div>

<div id="game-view">
    <div id="stun-overlay">
        <h2>STOP!</h2>
        <p>WAIT: <span id="stun-timer">2.0</span>s</p>
    </div>
    <div id="opp-display">
        <span id="opp-name">Searching...</span>: <span id="opp-score">0</span> pts
    </div>
    <div id="timer">60</div>
    <div class="miss-info"><span>MISS WARNING</span><span id="miss-text">0 / 10</span></div>
    <div class="miss-container"><div id="miss-bar"></div></div>
    <div id="target">Ready?</div>
    <div id="trans"></div>
    <div style="font-size: 1.5rem; font-weight: bold;">SCORE: <span id="my-score">0</span></div>
</div>

<div id="result-overlay">
    <h1 id="res-title" style="font-size: 3rem; color: var(--primary); margin: 0;">FINISH!</h1>
    <div id="final-stats" style="color: #fff; font-size: 1.2rem; line-height: 1.6; margin: 20px 0;"></div>
    <button class="btn btn-pvp" onclick="location.reload()">BACK TO LOBBY</button>
</div>

<script>
    // Firebase初期化
    const firebaseConfig = {
        apiKey: "AIzaSyBAWRI-BVjVNIv3oeE28xpJCVOkKubDPYU",
        authDomain: "typing-game-5176f.firebaseapp.com",
        projectId: "typing-game-5176f",
        databaseURL: "https://typing-game-5176f-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "typing-game-5176f.firebasestorage.app",
        messagingSenderId: "20880910771",
        appId: "1:20880910771:web:cf97c58cb713d5869943c6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "", mode = "solo", myRate = 1000, roomId = null, pKey = "p1", questions = [];
    let qIdx = 0, charIdx = 0, score = 0, gameStarted = false, isStunned = false, missCount = 0;
    const GAME_DURATION = 60;

    window.onload = () => {
        myRate = parseInt(localStorage.getItem('typing_rate')) || 1000;
        document.getElementById('my-rate-val').innerText = myRate;
        document.getElementById('player-name').value = localStorage.getItem('typing_name') || "";
        loadData();
        updateRanking();
        setInterval(updateRanking, 10000);
    };

    async function loadData() {
        try {
            const res = await fetch('questions.json?v=' + Date.now());
            questions = await res.json();
        } catch(e) { console.error("Data load error:", e); }
    }

    function updateRanking() {
        db.ref('rate_ranking').orderByValue().limitToLast(10).once('value', s => {
            let a = []; s.forEach(c => { a.push({n:c.key, v:c.val()}); });
            a.sort((x,y) => y.v - x.v);
            document.getElementById('rate-list').innerHTML = a.map((r,i) => `<div class="rank-item"><span>${i+1}. ${r.n}</span><span>${r.v}</span></div>`).join('');
        });
        db.ref('npc_ranking').orderByValue().limitToLast(10).once('value', s => {
            let a = []; s.forEach(c => { a.push({n:c.key, v:c.val()}); });
            a.sort((x,y) => y.v - x.v);
            document.getElementById('solo-list').innerHTML = a.map((r,i) => `<div class="rank-item"><span>${i+1}. ${r.n}</span><span>${r.v} WPM</span></div>`).join('');
        });
    }

    function initSolo() {
        mode = "solo";
        setupLobbyData();
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('target').innerText = "Press Any Key to START";
        document.getElementById('mobile-input').focus();
    }

    function setupLobbyData() {
        myName = document.getElementById('player-name').value.trim() || "Guest";
        localStorage.setItem('typing_name', myName);
    }

    // --- PvP Room ID & Matching Logic ---
    function initPvP() {
        mode = "pvp";
        setupLobbyData();
        document.getElementById('match-status').innerText = "Searching for opponent...";

        const waitRef = db.ref('waiting_room');
        waitRef.transaction(cur => {
            if (cur) return null; // 他の人が待っているなら自分は入らない
            return { id: "room_" + Date.now(), name: myName, rate: myRate };
        }, (err, committed, snap) => {
            if (snap.val() && snap.val().name === myName) {
                // ホスト(p1)
                roomId = snap.val().id; pKey = "p1";
                db.ref(`rooms/${roomId}/p1`).set({ name: myName, score: 0, rate: myRate });
                db.ref(`rooms/${roomId}/p2`).on('value', s => { if (s.exists()) startPvPFlow(); });
            } else {
                // ゲスト(p2)
                waitRef.once('value', s => {
                    if(!s.exists()) return;
                    roomId = s.val().id; pKey = "p2";
                    db.ref(`rooms/${roomId}/p2`).set({ name: myName, score: 0, rate: myRate });
                    waitRef.remove();
                    startPvPFlow();
                });
            }
        });
    }

    function startPvPFlow() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('opp-display').style.display = 'block';
        
        const oppKey = (pKey === "p1") ? "p2" : "p1";
        db.ref(`rooms/${roomId}/${oppKey}`).on('value', s => {
            if (s.exists()) {
                document.getElementById('opp-name').innerText = s.val().name;
                document.getElementById('opp-score').innerText = s.val().score;
            }
        });

        let countdown = 3;
        const i = setInterval(() => {
            document.getElementById('target').innerText = countdown;
            if (countdown-- <= 0) { clearInterval(i); startGame(); }
        }, 1000);
    }

    function startGame() {
        gameStarted = true; score = 0; missCount = 0; charIdx = 0;
        questions.sort(() => Math.random() - 0.5);
        render(); updateMissUI();
        let timeLeft = GAME_DURATION;
        const i = setInterval(() => {
            document.getElementById('timer').innerText = --timeLeft;
            if (timeLeft <= 0) { clearInterval(i); finishGame(); }
        }, 1000);
        document.getElementById('mobile-input').focus();
    }

    function render() {
        const q = questions[qIdx];
        if(!q) return;
        document.getElementById('target').innerHTML = q.english.split('').map((c, i) => 
            `<span class="${i === charIdx ? 'current' : (i < charIdx ? 'correct' : '')}">${c}</span>`).join('');
        document.getElementById('trans').innerText = q.japanese;
    }

    function handleInput(key) {
        if (!gameStarted && mode === "solo") { startGame(); return; }
        if (!gameStarted || isStunned || key.length !== 1) return;

        const q = questions[qIdx];
        if (key === q.english[charIdx]) {
            charIdx++; score++;
            missCount = Math.max(0, missCount - 1);
            if (charIdx >= q.english.length) { charIdx = 0; qIdx = (qIdx + 1) % questions.length; }
            render();
            document.getElementById('my-score').innerText = score;
            if (mode === "pvp") db.ref(`rooms/${roomId}/${pKey}`).update({ score: score });
        } else {
            missCount++;
            const s = document.querySelectorAll('#target span')[charIdx];
            if(s) { s.classList.add('wrong-char'); setTimeout(()=>s.classList.remove('wrong-char'),150); }
        }
        updateMissUI();
    }

    function updateMissUI() {
        document.getElementById('miss-bar').style.width = (missCount * 10) + "%";
        document.getElementById('miss-text').innerText = missCount + " / 10";
        if (missCount >= 10 && !isStunned) triggerStun();
    }

    function triggerStun() {
        isStunned = true;
        const overlay = document.getElementById('stun-overlay');
        overlay.style.display = 'flex';
        let r = 2.0;
        const i = setInterval(() => {
            r -= 0.1;
            document.getElementById('stun-timer').innerText = r.toFixed(1);
            if (r <= 0) {
                clearInterval(i); isStunned = false; missCount = 0;
                overlay.style.display = 'none'; updateMissUI();
                document.getElementById('mobile-input').focus();
            }
        }, 100);
    }

    function finishGame() {
        gameStarted = false;
        // WPM算出公式: (正解打鍵数 / 5) / (経過時間(秒) / 60)
        const wpm = (score / 5) / (GAME_DURATION / 60);
        const finalWPM = parseFloat(wpm.toFixed(1));

        if (mode === "pvp") {
            const oppKey = (pKey === "p1") ? "p2" : "p1";
            db.ref(`rooms/${roomId}`).once('value', async s => {
                const d = s.val();
                const myS = d[pKey].score;
                const oppS = d[oppKey].score;
                const oppRate = d[oppKey].rate || 1000;

                // --- レート計算ロジック ---
                let base = 30;
                let adj = Math.floor((myRate - oppRate) / 100) * 2;
                let change = 0, resTxt = "";

                if (myS > oppS) {
                    change = base - adj;
                    resTxt = `WIN (+${change})`; myRate += change;
                } else if (myS < oppS) {
                    change = base + adj;
                    resTxt = `LOSE (-${change})`; myRate = Math.max(0, myRate - change);
                } else {
                    resTxt = "DRAW (±0)";
                }

                document.getElementById('res-title').innerText = resTxt;
                document.getElementById('final-stats').innerHTML = 
                    `Score: ${myS} vs ${oppS}<br>WPM: ${finalWPM}<br>New Rate: ${myRate}`;
                
                db.ref(`rate_ranking/${myName}`).set(myRate);
                localStorage.setItem('typing_rate', myRate);
                db.ref(`rooms/${roomId}`).remove(); // ルーム削除
            });
        } else {
            document.getElementById('final-stats').innerHTML = `SCORE: ${score}<br>WPM: ${finalWPM}`;
            db.ref(`npc_ranking/${myName}`).transaction(c => finalWPM > (c||0) ? finalWPM : c);
        }
        document.getElementById('result-overlay').style.display = 'flex';
    }

    // 入力イベント
    window.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' && e.target.id !== 'mobile-input') return;
        handleInput(e.key);
    });
    document.getElementById('mobile-input').addEventListener('input', e => {
        const v = e.target.value;
        if(v.length > 0) { handleInput(v.slice(-1)); e.target.value = ""; }
    });
    // モバイルで画面タップ時にキーボードを出す
    document.body.addEventListener('touchstart', () => {
        if(gameStarted && !isStunned) document.getElementById('mobile-input').focus();
    });
</script>
</body>
</html>
