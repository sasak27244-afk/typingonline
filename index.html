<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Typing Battle - Connection Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #lobby { position: fixed; inset: 0; background: #111; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lobby-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #333; text-align: center; width: 400px; }
        .btn { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 10px; }
        .btn-pvp { background: #00e676; color: #000; }
        .btn-rank { background: #222; color: #00e676; border: 1px solid #00e676; }
        
        #ranking-area { display: none; width: 90%; max-width: 800px; margin-top: 20px; gap: 20px; }
        .ranking-board { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #444; min-height: 100px; }
        
        /* スコア枠線の復活・強化 */
        .score-box { flex: 1; padding: 15px; background: #1a1a1a; border: 3px solid #333; border-radius: 10px; font-size: 1.5rem; margin: 10px; text-align: center; }
        #game-view { display: none; width: 90%; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="lobby-box">
        <h1 style="color: #00e676;">TYPING BATTLE</h1>
        <input type="text" id="player-name" placeholder="YOUR NAME" style="padding:10px; width:80%; margin-bottom:10px;">
        <br>
        <button class="btn btn-pvp" onclick="joinGame()">START GAME</button>
        <button class="btn btn-rank" onclick="toggleRanking()">VIEW RANKING</button>
        <div id="status-debug" style="font-size: 10px; color: #555; margin-top: 10px;">System Ready</div>
    </div>

    <div id="ranking-area" id="rank-area">
        <div class="ranking-board">
            <h3 style="color:#00e676; text-align:center;">RATE TOP 10</h3>
            <div id="rate-list" style="font-size: 0.9rem;">Waiting...</div>
        </div>
        <div class="ranking-board">
            <h3 style="color:#00e676; text-align:center;">NPC BEST 10</h3>
            <div id="npc-list" style="font-size: 0.9rem;">Waiting...</div>
        </div>
    </div>
</div>

<div id="game-view">
    <div id="timer" style="font-size: 3rem; color: #ff5252; text-align:center;">60</div>
    <div style="display: flex;">
        <div class="score-box">YOU: <span id="my-score">0</span></div>
        <div class="score-box">ENEMY: <span id="opp-score">0</span></div>
    </div>
</div>

<script>
    // 【重要】ここの値を、自分のFirebaseコンソールの「マイアプリ」からコピーしたものに貼り替えてください
    const firebaseConfig = {
        apiKey: "AIzaSyBAWRI-BVjVNIv3oeE28xpJCVOkKubDPYU",
        authDomain: "typing-game-5176f.firebaseapp.com",
        projectId: "typing-game-5176f",
        databaseURL: "https://typing-game-5176f-default-rtdb.firebaseio.com/",
        storageBucket: "typing-game-5176f.firebasestorage.app",
        messagingSenderId: "20880910771",
        appId: "1:20880910771:web:cf97c58cb713d5869943c6"
    };

    // 初期化チェック
    let db;
    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.database();
        document.getElementById('status-debug').innerText = "Firebase Initialized";
    } catch (e) {
        document.getElementById('status-debug').innerText = "Init Error: " + e.message;
    }

    function toggleRanking() {
        const area = document.getElementById('ranking-area');
        if (area.style.display === 'flex') {
            area.style.display = 'none';
        } else {
            area.style.display = 'flex';
            fetchData();
        }
    }

    function fetchData() {
        const rList = document.getElementById('rate-list');
        const nList = document.getElementById('npc-list');
        
        rList.innerText = "Connecting...";
        nList.innerText = "Connecting...";

        // タイムアウト設定（5秒経っても反応がなければエラーを出す）
        const timeout = setTimeout(() => {
            if (rList.innerText === "Connecting...") {
                rList.innerText = "Timeout: No response from DB.";
                nList.innerText = "Check your Firebase Rules.";
            }
        }, 5000);

        db.ref('rate_ranking').orderByValue().limitToLast(10).once('value', snap => {
            clearTimeout(timeout);
            rList.innerHTML = "";
            let hasData = false;
            snap.forEach(child => {
                hasData = true;
                rList.innerHTML = `<div>${child.key}: ${child.val()}</div>` + rList.innerHTML;
            });
            if (!hasData) rList.innerText = "No data in Database.";
        }, err => {
            rList.innerText = "DB Error: " + err.message;
        });
    }

    function joinGame() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
    }
</script>
</body>
</html>
